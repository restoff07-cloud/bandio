<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bandio — Articles</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --sw:224px;
  --white:#ffffff;--bg:#f7f7f8;--ink:#111111;--ink2:#444444;--ink3:#777777;--ink4:#bbbbbb;
  --bdr:#e8e8ea;--bdr2:#d4d4d8;
  --blue:#4f7ef8;--blue-bg:#eef2ff;--blue-light:#dce6ff;
  --sh:0 1px 2px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.04);
  --shm:0 2px 8px rgba(0,0,0,.06),0 12px 32px rgba(0,0,0,.06);
  --r:10px;--rm:14px;--rl:18px;
  --fd:'Geist',system-ui,sans-serif;--fb:'Geist',system-ui,sans-serif;
}
html,body{height:100%;}
body{font-family:var(--fb);background:var(--bg);color:var(--ink);display:flex;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
a{text-decoration:none;color:inherit;}
button{font-family:var(--fb);cursor:pointer;border:none;background:none;}
/* SIDEBAR */
.sidebar{width:var(--sw);min-width:var(--sw);background:var(--white);border-right:1px solid var(--bdr);min-height:100vh;display:flex;flex-direction:column;padding:0;position:fixed;top:0;left:0;bottom:0;z-index:60;overflow-y:auto;scrollbar-width:none;transition:transform .26s cubic-bezier(.4,0,.2,1);}
.sidebar::-webkit-scrollbar{display:none;}
.s-top{padding:1.25rem 1.1rem 0;}
.s-logo{display:flex;align-items:center;gap:.45rem;padding:.5rem;margin-bottom:1.5rem;}
.s-logo-txt{font-size:1.15rem;font-weight:700;color:var(--ink);letter-spacing:-.025em;}
.s-logo-dot{width:7px;height:7px;border-radius:50%;background:var(--blue);flex-shrink:0;}
.nav-item{display:flex;align-items:center;gap:.65rem;padding:.52rem .75rem;border-radius:var(--r);font-size:.84rem;font-weight:500;color:var(--ink2);transition:all .15s;margin-bottom:2px;position:relative;}
.nav-item:hover{background:var(--bg);color:var(--ink);}
.nav-item.active{background:var(--blue-bg);color:var(--blue);font-weight:600;}
.nav-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.95rem;background:transparent;transition:background .15s;}
.nav-item.active .nav-icon{background:var(--blue-light);}
.nav-sep{height:1px;background:var(--bdr);margin:1rem .5rem;}
.nav-badge{margin-left:auto;background:#7c3aed;color:#fff;font-size:.6rem;font-weight:700;padding:.1rem .42rem;border-radius:100px;letter-spacing:.03em;}
.s-bottom{margin-top:auto;padding:0 1.1rem 1.25rem;}
.user-chip{display:flex;align-items:center;gap:.6rem;padding:.55rem .6rem;border-radius:var(--r);}
.u-av{width:30px;height:30px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.76rem;color:#fff;flex-shrink:0;}
.u-name{font-size:.8rem;font-weight:600;color:var(--ink);}
.u-plan{font-size:.63rem;color:var(--ink3);margin-top:1px;}
/* MOBILE */
.mob-bar{display:none;background:var(--white);padding:.75rem 1rem;align-items:center;gap:.75rem;position:sticky;top:0;z-index:70;border-bottom:1px solid var(--bdr);}
.mob-logo{font-size:1.1rem;font-weight:700;color:var(--ink);letter-spacing:-.025em;flex:1;}
.hamburger{display:none;flex-direction:column;gap:4px;padding:.4rem;border-radius:8px;cursor:pointer;}
.hamburger span{display:block;width:18px;height:1.8px;background:var(--ink);border-radius:2px;}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:59;backdrop-filter:blur(2px);}
.sb-overlay.show{display:block;}
/* MAIN WRAP */
.main-wrap{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;min-height:100vh;}
.main{padding:2rem 2.25rem 3rem;}
/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:flex-end;gap:.65rem;padding:.9rem 2rem;border-bottom:1px solid var(--bdr);background:var(--white);position:sticky;top:0;z-index:40;}
.tb-user{display:flex;align-items:center;gap:.55rem;padding:.35rem .6rem .35rem .35rem;border-radius:100px;border:1px solid var(--bdr);cursor:pointer;background:var(--white);transition:all .15s;}
.tb-user:hover{background:var(--bg);}
.tb-av{width:28px;height:28px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;color:#fff;flex-shrink:0;}
.tb-name{font-size:.82rem;font-weight:600;color:var(--ink);}
/* PAGE HEADER */
.page-hd{margin-bottom:1.75rem;}
.page-title{font-size:1.5rem;font-weight:700;letter-spacing:-.03em;color:var(--ink);margin-bottom:.3rem;}
.page-sub{font-size:.88rem;color:var(--ink3);line-height:1.6;}
/* CARDS */
.card{background:var(--white);border:1px solid var(--bdr);border-radius:var(--rl);box-shadow:var(--sh);}
.card:hover{box-shadow:var(--shm);}
/* BUTTONS */
.btn-primary{display:inline-flex;align-items:center;gap:.45rem;padding:.62rem 1.3rem;background:var(--ink);color:#fff;border-radius:var(--rm);font-size:.85rem;font-weight:600;transition:all .15s;}
.btn-primary:hover{background:var(--blue);transform:translateY(-1px);}
.btn-blue{display:inline-flex;align-items:center;gap:.45rem;padding:.62rem 1.3rem;background:var(--blue);color:#fff;border-radius:var(--rm);font-size:.85rem;font-weight:600;transition:all .15s;box-shadow:0 2px 8px rgba(79,126,248,.25);}
.btn-blue:hover{background:#3d6cf7;transform:translateY(-1px);}
.btn-outline{display:inline-flex;align-items:center;gap:.45rem;padding:.6rem 1.3rem;background:var(--white);border:1.5px solid var(--bdr2);color:var(--ink2);border-radius:var(--rm);font-size:.85rem;font-weight:600;transition:all .15s;}
.btn-outline:hover{border-color:var(--ink);background:var(--bg);}
/* SECTION TITLE */
.sec-title{font-size:.82rem;font-weight:700;color:var(--ink);letter-spacing:-.01em;margin-bottom:.85rem;}
/* RESPONSIVE */
@media(max-width:640px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);box-shadow:var(--shm);}
  .main-wrap{margin-left:0!important;}
  .mob-bar{display:flex!important;}
  .hamburger{display:flex!important;}
  .topbar{display:none;}
  .main{padding:1rem 1rem 2rem;}
}

.articles-list{display:flex;flex-direction:column;gap:.65rem;max-width:760px;}
.article-row{border-radius:var(--rm);overflow:hidden;border:1.5px solid var(--bdr);background:var(--white);transition:all .15s;box-shadow:var(--sh);}
.article-row:hover{box-shadow:var(--shm);}
.article-row.prem-row{background:#fffbf0;border-color:#f0e4a0;}
.article-header{display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.1rem;cursor:pointer;gap:.75rem;}
.ah-left{display:flex;align-items:center;gap:.75rem;flex:1;min-width:0;}
.ah-num{font-size:.7rem;font-weight:700;color:var(--ink4);width:20px;flex-shrink:0;}
.ah-title{font-size:.88rem;font-weight:600;color:var(--ink);}
.prem-badge{display:inline-flex;align-items:center;gap:.25rem;font-size:.62rem;font-weight:700;padding:.14rem .45rem;border-radius:100px;background:#fef3c7;color:#92400e;border:1px solid #fde68a;flex-shrink:0;}
.toggle-icon{font-size:.72rem;color:var(--ink4);flex-shrink:0;transition:transform .2s;}
.toggle-icon.open{transform:rotate(180deg);}
.article-body{display:none;padding:0 1.1rem 1.1rem;}
.article-body.show{display:block;}
.article-text{font-size:.87rem;line-height:1.85;color:var(--ink2);margin-bottom:1rem;}
.article-text p{margin-bottom:.75rem;}
.vocab-word{border-bottom:1.5px dotted var(--blue);cursor:pointer;position:relative;}
.vocab-word:hover{color:var(--blue);}
.vocab-popup{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:.74rem;padding:.45rem .75rem;border-radius:8px;max-width:220px;z-index:99;box-shadow:0 4px 16px rgba(0,0,0,.18);}
.vocab-word:hover .vocab-popup{display:block;}
.article-download{display:inline-flex;align-items:center;gap:.45rem;padding:.48rem 1rem;background:var(--ink);color:#fff;border-radius:var(--r);font-size:.8rem;font-weight:600;transition:background .15s;}
.article-download:hover{background:var(--blue);}
.upgrade-gate{padding:.85rem 1.1rem;display:flex;align-items:center;justify-content:space-between;gap:.75rem;flex-wrap:wrap;background:#fffbf0;border-top:1px solid #f0e4a0;}
.ug-text{font-size:.83rem;font-weight:600;color:#92400e;}
.ug-btn{padding:.38rem .9rem;background:var(--blue);color:#fff;border:none;border-radius:var(--r);font-size:.78rem;font-weight:600;cursor:pointer;text-decoration:none;}
.loading-state{text-align:center;padding:3rem;color:var(--ink3);font-size:.88rem;}
</style>
</head>
<body>

<div class="main-wrap">
  <div class="topbar"><div class="tb-user"><div class="tb-av" id="tb-av">?</div><span class="tb-name" id="tb-name">Student</span></div></div>
  <main class="main">
    <div class="page-hd">
      <div class="page-title">Articles</div>
      <div class="page-sub">Read IELTS-level articles. Free articles are always open — Premium unlocks all 40.</div>
    </div>
    <div class="articles-list" id="articles-list"><div class="loading-state">Loading articles…</div></div>
  </main>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const cfg={apiKey:"AIzaSyBZdCEYUded-YT9RMSr1R7wg8VAqK9HCz0",authDomain:"bandio-53433.firebaseapp.com",projectId:"bandio-53433",storageBucket:"bandio-53433.firebasestorage.app",messagingSenderId:"161548316253",appId:"1:161548316253:web:a7746750b2ea6d239d67b4"};
const app=initializeApp(cfg);const auth=getAuth(app);const db=getFirestore(app);
let userPlan="free";
function resolveName(d,u){const r=d.name||d.displayName||d.username||u.displayName||u.email||"Student";return r.includes("@")?r.split("@")[0]:r.split(" ")[0];}
onAuthStateChanged(auth,async user=>{
  if(!user){location.href="bandio-login.html";return;}
  try{
    const snap=await getDoc(doc(db,"users",user.uid));
    const data=snap.exists()?snap.data():{};
    const name=resolveName(data,user);
    userPlan=data.planType||data.plan||"free";
    ["sb-av","tb-av"].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=name.charAt(0).toUpperCase();});
    ["sb-name","tb-name"].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=name;});
    const ps={premium:"Premium ✦",intensive:"Intensive ✦✦",free:"Free plan"};
    const sp=document.getElementById("sb-plan");if(sp)sp.textContent=ps[userPlan]||"Free plan";
  }catch(e){console.warn(e.message);}
  loadArticles();
});
async function loadArticles(){
  const list=document.getElementById("articles-list");
  try{
    const snap=await getDocs(query(collection(db,"articles"),orderBy("order","asc")));
    const articles=[];snap.forEach(d=>{const a=d.data();a.id=d.id;articles.push(a);});
    if(!articles.length){list.innerHTML='<div class="loading-state">No articles yet.</div>';return;}
    list.innerHTML=articles.map((a,i)=>buildRow(a,i)).join("");
    document.querySelectorAll(".article-header").forEach(h=>h.addEventListener("click",()=>toggleArticle(h)));
  }catch(e){list.innerHTML='<div class="loading-state">Could not load articles.</div>';}
}
function buildRow(a,i){
  const isFree=a.tier==="free";
  const badge=isFree?"":'<span class="prem-badge">★ PREMIUM</span>';
  return '<div class="article-row '+(!isFree?"prem-row":"")+'" id="arow-'+a.id+'">'+
    '<div class="article-header" data-id="'+a.id+'">'+
    '<div class="ah-left"><span class="ah-num">'+String(i+1).padStart(2,"0")+'</span><span class="ah-title">'+esc(a.title||"Untitled")+'</span>'+badge+'</div>'+
    '<span class="toggle-icon">▾</span></div>'+
    '<div class="article-body" id="abody-'+a.id+'">'+buildBody(a,isFree)+'</div></div>';
}
function buildBody(a,isFree){
  const canRead=isFree||userPlan==="premium"||userPlan==="intensive";
  if(!canRead)return '<div class="upgrade-gate"><span class="ug-text">★ Premium & Intensive only</span><a class="ug-btn" href="bandio-pricing.html">Upgrade</a></div>';
  let html='<div class="article-text">';
  let processed=esc(a.text||"");
  (a.vocab||[]).forEach(v=>{processed=processed.replace(new RegExp("\\b"+escRe(v.word)+"\\b","gi"),m=>'<span class="vocab-word" tabindex="0">'+m+'<span class="vocab-popup">'+esc(v.meaning)+'</span></span>');});
  processed.split(/\n\n+/).forEach(p=>{if(p.trim())html+='<p>'+p.trim()+'</p>';});
  html+='</div>';
  if(a.pdfUrl)html+='<a class="article-download" href="'+a.pdfUrl+'" target="_blank">↓ Download PDF</a>';
  return html;
}
function toggleArticle(h){
  const id=h.dataset.id;const body=document.getElementById("abody-"+id);const icon=h.querySelector(".toggle-icon");
  const isOpen=body.classList.contains("show");
  document.querySelectorAll(".article-body.show").forEach(b=>b.classList.remove("show"));
  document.querySelectorAll(".toggle-icon.open").forEach(ic=>ic.classList.remove("open"));
  if(!isOpen){body.classList.add("show");icon.classList.add("open");}
}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function escRe(s){return s.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");}
window.doSignOut=async()=>{await signOut(auth);location.href="bandio-login.html";};
</script>
<script>
function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('sbOverlay').classList.add('show');document.body.style.overflow='hidden';}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sbOverlay').classList.remove('show');document.body.style.overflow='';}
var _po=false;
function togglePractice(){_po=!_po;document.getElementById('pmenu').style.display=_po?'block':'none';document.getElementById('pchev').style.transform=_po?'rotate(180deg)':'rotate(0)';}
document.querySelectorAll('.nav-item').forEach(function(el){el.addEventListener('click',function(){if(window.innerWidth<=640)closeSidebar();});});
</script>

</body>
