<head>

<title>Bandio — Reading Practice</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --sw:224px;
  --white:#ffffff;--bg:#f7f7f8;--ink:#111111;--ink2:#444444;--ink3:#777777;--ink4:#bbbbbb;
  --bdr:#e8e8ea;--bdr2:#d4d4d8;
  --blue:#4f7ef8;--blue-bg:#eef2ff;--blue-light:#dce6ff;
  --sh:0 1px 2px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.04);
  --shm:0 2px 8px rgba(0,0,0,.06),0 12px 32px rgba(0,0,0,.06);
  --r:10px;--rm:14px;--rl:18px;
  --fd:'Geist',system-ui,sans-serif;--fb:'Geist',system-ui,sans-serif;
}
html,body{height:100%;}
body{font-family:var(--fb);background:var(--bg);color:var(--ink);display:flex;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
a{text-decoration:none;color:inherit;}
button{font-family:var(--fb);cursor:pointer;border:none;background:none;}
/* SIDEBAR */
.sidebar{width:var(--sw);min-width:var(--sw);background:var(--white);border-right:1px solid var(--bdr);min-height:100vh;display:flex;flex-direction:column;padding:0;position:fixed;top:0;left:0;bottom:0;z-index:60;overflow-y:auto;scrollbar-width:none;transition:transform .26s cubic-bezier(.4,0,.2,1);}
.sidebar::-webkit-scrollbar{display:none;}
.s-top{padding:1.25rem 1.1rem 0;}
.s-logo{display:flex;align-items:center;gap:.45rem;padding:.5rem;margin-bottom:1.5rem;}
.s-logo-txt{font-size:1.15rem;font-weight:700;color:var(--ink);letter-spacing:-.025em;}
.s-logo-dot{width:7px;height:7px;border-radius:50%;background:var(--blue);flex-shrink:0;}
.nav-item{display:flex;align-items:center;gap:.65rem;padding:.52rem .75rem;border-radius:var(--r);font-size:.84rem;font-weight:500;color:var(--ink2);transition:all .15s;margin-bottom:2px;position:relative;}
.nav-item:hover{background:var(--bg);color:var(--ink);}
.nav-item.active{background:var(--blue-bg);color:var(--blue);font-weight:600;}
.nav-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.95rem;background:transparent;transition:background .15s;}
.nav-item.active .nav-icon{background:var(--blue-light);}
.nav-sep{height:1px;background:var(--bdr);margin:1rem .5rem;}
.nav-badge{margin-left:auto;background:#7c3aed;color:#fff;font-size:.6rem;font-weight:700;padding:.1rem .42rem;border-radius:100px;letter-spacing:.03em;}
.s-bottom{margin-top:auto;padding:0 1.1rem 1.25rem;}
.user-chip{display:flex;align-items:center;gap:.6rem;padding:.55rem .6rem;border-radius:var(--r);}
.u-av{width:30px;height:30px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.76rem;color:#fff;flex-shrink:0;}
.u-name{font-size:.8rem;font-weight:600;color:var(--ink);}
.u-plan{font-size:.63rem;color:var(--ink3);margin-top:1px;}
/* MOBILE */
.mob-bar{display:none;background:var(--white);padding:.75rem 1rem;align-items:center;gap:.75rem;position:sticky;top:0;z-index:70;border-bottom:1px solid var(--bdr);}
.mob-logo{font-size:1.1rem;font-weight:700;color:var(--ink);letter-spacing:-.025em;flex:1;}
.hamburger{display:none;flex-direction:column;gap:4px;padding:.4rem;border-radius:8px;cursor:pointer;}
.hamburger span{display:block;width:18px;height:1.8px;background:var(--ink);border-radius:2px;}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:59;backdrop-filter:blur(2px);}
.sb-overlay.show{display:block;}
/* MAIN WRAP */
.main-wrap{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;min-height:100vh;}
.main{padding:2rem 2.25rem 3rem;}
/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:flex-end;gap:.65rem;padding:.9rem 2rem;border-bottom:1px solid var(--bdr);background:var(--white);position:sticky;top:0;z-index:40;}
.tb-user{display:flex;align-items:center;gap:.55rem;padding:.35rem .6rem .35rem .35rem;border-radius:100px;border:1px solid var(--bdr);cursor:pointer;background:var(--white);transition:all .15s;}
.tb-user:hover{background:var(--bg);}
.tb-av{width:28px;height:28px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;color:#fff;flex-shrink:0;}
.tb-name{font-size:.82rem;font-weight:600;color:var(--ink);}
/* PAGE HEADER */
.page-hd{margin-bottom:1.75rem;}
.page-title{font-size:1.5rem;font-weight:700;letter-spacing:-.03em;color:var(--ink);margin-bottom:.3rem;}
.page-sub{font-size:.88rem;color:var(--ink3);line-height:1.6;}
/* CARDS */
.card{background:var(--white);border:1px solid var(--bdr);border-radius:var(--rl);box-shadow:var(--sh);}
.card:hover{box-shadow:var(--shm);}
/* BUTTONS */
.btn-primary{display:inline-flex;align-items:center;gap:.45rem;padding:.62rem 1.3rem;background:var(--ink);color:#fff;border-radius:var(--rm);font-size:.85rem;font-weight:600;transition:all .15s;}
.btn-primary:hover{background:var(--blue);transform:translateY(-1px);}
.btn-blue{display:inline-flex;align-items:center;gap:.45rem;padding:.62rem 1.3rem;background:var(--blue);color:#fff;border-radius:var(--rm);font-size:.85rem;font-weight:600;transition:all .15s;box-shadow:0 2px 8px rgba(79,126,248,.25);}
.btn-blue:hover{background:#3d6cf7;transform:translateY(-1px);}
.btn-outline{display:inline-flex;align-items:center;gap:.45rem;padding:.6rem 1.3rem;background:var(--white);border:1.5px solid var(--bdr2);color:var(--ink2);border-radius:var(--rm);font-size:.85rem;font-weight:600;transition:all .15s;}
.btn-outline:hover{border-color:var(--ink);background:var(--bg);}
/* SECTION TITLE */
.sec-title{font-size:.82rem;font-weight:700;color:var(--ink);letter-spacing:-.01em;margin-bottom:.85rem;}
/* RESPONSIVE */
@media(max-width:640px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);box-shadow:var(--shm);}
  .main-wrap{margin-left:0!important;}
  .mob-bar{display:flex!important;}
  .hamburger{display:flex!important;}
  .topbar{display:none;}
  .main{padding:1rem 1rem 2rem;}
}

.tests-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:.9rem;max-width:900px;}
.test-card{background:var(--white);border:1px solid var(--bdr);border-radius:var(--rl);padding:1.35rem;box-shadow:var(--sh);transition:all .18s;cursor:pointer;display:block;text-decoration:none;}
.test-card:hover{box-shadow:var(--shm);transform:translateY(-2px);border-color:var(--bdr2);}
.tc-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.75rem;}
.tc-icon{width:40px;height:40px;border-radius:10px;background:#e6f9f0;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
.tc-tag{font-size:.62rem;font-weight:700;padding:.14rem .45rem;border-radius:100px;}
.tc-tag.free{background:#dcfce7;color:#166534;}
.tc-tag.prem{background:#fef3c7;color:#92400e;}
.tc-name{font-size:.9rem;font-weight:700;color:var(--ink);margin-bottom:.2rem;letter-spacing:-.01em;}
.tc-meta{font-size:.74rem;color:var(--ink3);margin-bottom:.75rem;}
.tc-info{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.85rem;}
.tc-info-item{font-size:.68rem;font-weight:500;color:var(--ink3);background:var(--bg);padding:.14rem .48rem;border-radius:100px;}
.tc-progress{height:3px;background:var(--bg);border-radius:100px;overflow:hidden;margin-bottom:.6rem;}
.tc-progress-fill{height:100%;border-radius:100px;background:var(--blue);}
.tc-btn{display:flex;align-items:center;justify-content:center;padding:.46rem;background:var(--ink);color:#fff;border-radius:var(--r);font-size:.78rem;font-weight:600;transition:background .15s;}
.test-card:hover .tc-btn{background:var(--blue);}
.section-filter{display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:1.25rem;}
.filter-btn{padding:.38rem .8rem;border:1px solid var(--bdr);border-radius:100px;font-size:.78rem;font-weight:500;color:var(--ink3);cursor:pointer;background:var(--white);transition:all .15s;font-family:var(--fb);}
.filter-btn:hover,.filter-btn.active{background:var(--ink);color:#fff;border-color:var(--ink);}
.loading-state{text-align:center;padding:3rem;color:var(--ink3);font-size:.88rem;}
.empty-state{text-align:center;padding:3rem;color:var(--ink3);font-size:.88rem;background:var(--white);border:1px dashed var(--bdr);border-radius:var(--rl);}
</style>
</head>

<script type="module">

  import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  const app=initializeApp({apiKey:"AIzaSyBZdCEYUded-YT9RMSr1R7wg8VAqK9HCz0",authDomain:"bandio-53433.firebaseapp.com",projectId:"bandio-53433",storageBucket:"bandio-53433.firebasestorage.app",messagingSenderId:"161548316253",appId:"1:161548316253:web:a7746750b2ea6d239d67b4"});
  const _auth=getAuth(app);
  window._firebaseAuth=_auth;
  onAuthStateChanged(_auth,async function(u){
    if(!u){location.replace("bandio-login.html");return;}
    window._currentUserUid = u.uid;
    window._checkPlanLive = async function(uid){
      try{
        const {getFirestore,getDoc,doc}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
        const snap=await getDoc(doc(getFirestore(app),'users',uid));
        if(snap.exists()){var plan=snap.data().plan||'free';localStorage.setItem('bnd_plan',plan);return plan;}
      }catch(e){}
      return localStorage.getItem('bnd_plan')||'free';
    };
    try{
      const {getFirestore,getDoc,doc}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
      const snap=await getDoc(doc(getFirestore(app),'users',u.uid));
      if(snap.exists()) localStorage.setItem('bnd_plan',snap.data().plan||'free');
    }catch(e){}
    loadFirestoreTests();
  });

  // Load admin-uploaded tests from Firestore (type-filtered for this page)
  async function loadFirestoreTests(){
    try{
      const {getFirestore,collection,getDocs,query,where}=await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
      const db2=getFirestore(app);
      const q2=query(collection(db2,'tests'),where('type','==','practice-reading'));
      const snap=await getDocs(q2);
      if(snap.empty)return;
      snap.forEach(function(d){
        var t=d.data();
        if(!t.title)return;
        if(!TESTS.find(function(x){return x.name===t.title;})){
          TESTS.push({name:t.title,topic:t.passages&&t.passages[0]?t.passages[0].title||'reading test':'reading test',level:t.level||'MEDIUM',time:t.time||'60 minutes',questions:t.questions||40,type:'practice-reading',tier:t.access||'free',firestoreDocId:d.id,passages:t.passages||[]});
        }
      });
      if(typeof renderList==='function')renderList();
    }catch(e){console.log('Firestore load error:',e.message);}
  }

</script>
<script>

function sanitize(str) {
  var d = document.createElement('div');
  d.textContent = String(str || '');
  return d.innerHTML;
}
var TESTS=[
  {name:'Cambridge 16 TEST_4 — Passage 1',topic:'Urban Green Spaces',level:'MEDIUM',time:'20 minutes',questions:13,type:'tfng',tier:'free'},
  {name:'Cambridge 17 TEST_3 — Passage 1',topic:'The Life of Marie Curie',level:'MEDIUM',time:'20 minutes',questions:13,type:'tfng',tier:'free'},
  {name:'Cambridge 17 TEST_4 — Passage 2',topic:'Psychology of Colour',level:'MEDIUM',time:'20 minutes',questions:14,type:'mcq',tier:'free'},
  {name:'Cambridge 18 TEST_1 — Passage 1',topic:'History of Glass',level:'EASY',time:'20 minutes',questions:13,type:'gap',tier:'free'},
  {name:'Cambridge 18 TEST_2 — Passage 2',topic:'Animal Navigation',level:'HARD',time:'20 minutes',questions:14,type:'tfng',tier:'premium'},
  {name:'Cambridge 18 TEST_3 — Passage 3',topic:'The Colosseum',level:'HARD',time:'20 minutes',questions:14,type:'mcq',tier:'premium'},
];
var activeTab='all';
function setTab(t,el){activeTab=t;document.querySelectorAll('.ft').forEach(function(x){x.classList.remove('on');});el.classList.add('on');renderList();}
function _boldMd(s){
  // Convert **text** to <b>text</b>
  return String(s||'').replace(/\*\*(.+?)\*\*/g,'<b>$1</b>');
}
function renderList(){
  var s=(document.getElementById('srch').value||'').toLowerCase();
  var lv=document.getElementById('ddLv').value;
  var ty=document.getElementById('ddTy').value;
  var f=TESTS.filter(function(t){
    if(activeTab==='free'&&t.tier!=='free')return false;
    if(activeTab==='premium'&&t.tier!=='premium')return false;
    if(s&&t.name.toLowerCase().indexOf(s)===-1&&t.topic.toLowerCase().indexOf(s)===-1)return false;
    if(lv&&t.level!==lv)return false;
    if(ty&&t.type!==ty)return false;
    return true;
  });
  var w=document.getElementById('tlist');
  if(!f.length){w.innerHTML='<div class="nores">No tests match your filters.</div>';return;}
  w.innerHTML=f.map(function(t){return'<div class="tcard"><div class="tcard-info"><div class="tcard-top"><span class="tcard-name">'+t.name+'</span><span class="tbadge '+(t.tier==='free'?'free':'prem')+'">'+(t.tier==='free'?'🎁 Free':'🔒 Premium')+'</span></div><div class="tcard-sub">Topic: '+t.topic+' – '+t.level+' Level</div><div class="tcard-meta"><span class="tmeta">📊 '+t.level+'</span><span class="tmeta-sep">|</span><span class="tmeta">⏱ '+t.time+'</span><span class="tmeta-sep">|</span><span class="tmeta">✓ '+t.questions+' questions</span></div></div>'+'<button class="start-btn" onclick="startTest(\''+t.name+'\')">'+( t.tier==='premium'?'🔒 Start':'Start test')+'</button>'+'</div>';}).join('');
}
function startTest(name){
  var test = TESTS.find(function(t){ return t.name===name; });
  if (!test || test.tier !== 'premium') { _startTestNow(name); return; }

  var uid = window._currentUserUid;
  if (!uid) {
    setTimeout(function(){ startTest(name); }, 1500);
    return;
  }

  // Use Firebase SDK via the already-loaded module scope token
  // Get fresh ID token from the current Firebase user

          +'</div></div>';
  }
  var qlist=document.getElementById('ovl-qlist');

let selectedRange = null;

  if (selection.toString().length > 0) {
    selectedRange = selection.getRangeAt(0);
    let rect = selectedRange.getBoundingClientRect();
    let popup = document.getElementById("popup");

    popup.style.top = (rect.top + window.scrollY - 40) + "px";
    popup.style.left = (rect.left + window.scrollX) + "px";
    popup.style.display = "flex";
  } else {
    document.getElementById("popup").style.display = "none";
  }
});

function highlightText() {
  if (!selectedRange) return;
  let span = document.createElement("span");
  span.className = "hl-yellow";
  selectedRange.surroundContents(span);
  window.getSelection().removeAllRanges();
  document.getElementById("popup").style.display = "none";
}

function addNote() {
  if (!selectedRange) return;
  let note = prompt("Write your note:");
  if (!note) return;
  let span = document.createElement("span");
  span.className = "hl-note";
  span.title = note;
  selectedRange.surroundContents(span);
  window.getSelection().removeAllRanges();
  document.getElementById("popup").style.display = "none";
}

function removeHighlight() {
  if (!selectedRange) return;

  let container = selectedRange.commonAncestorContainer;

  // find parent span
  let span = container.nodeType === 3 ? container.parentNode : container;

  if (span.classList && (span.classList.contains("hl-yellow") || span.classList.contains("hl-note"))) {
    let parent = span.parentNode;
    while (span.firstChild) {
      parent.insertBefore(span.firstChild, span);
    }
    parent.removeChild(span);
  }

  window.getSelection().removeAllRanges();
  document.getElementById("popup").style.display = "none";
}

function _buildQHTML(q,num,num2){
  var type=q.type||'Gap fill';

  if(type==='Multiple choice'||type==='multiple-choice'){
    html+='<div class="mopts">';
    (q.options||[]).forEach(function(o){html+='<div class="mopt" onclick="pm(this,'+num+',\''+o.letter+'\')"><div class="mc">'+o.letter+'</div><span class="ml">'+_escHtml(o.text)+'</span></div>';});
    html+='</div>';

    html+='</div>';
  } else if(type==='Y/N/NG'||type==='y/n/ng'){
    html+='<div class="ropts">';

    } else {
      html+='<div style="padding-left:2rem;margin-bottom:.85rem;">'
           +'<select id="g'+num+'" onchange="A['+num+']=this.value;dot('+num+',this.value!==\'\');up();" '
           +'style="min-width:65px;padding:.3rem .4rem;border:1px solid #ccc;border-radius:6px;font-family:inherit;font-size:.85rem;cursor:pointer;">'
           +'<option value=""></option>';
      parsedF.forEach(function(o){
        html+='<option value="'+_escHtml(o.lbl)+'">'+_escHtml(o.lbl)+'</option>';
      });
      html+='</select></div>';
    }
    } else if(type==='Sentence endings'){
    var matchListSE=(q.extra&&q.extra.matchList)||'';
    var stmtListSE=(q.extra&&q.extra.stmtList)||'';
    var matchOptsSE=matchListSE.split('\n').map(function(s){return s.trim();}).filter(Boolean);
    var stmtsSE=stmtListSE.split('\n').map(function(s){return s.trim();}).filter(Boolean);
    var parsedSE=matchOptsSE.map(function(opt){
      var m=opt.match(/^([^\s.\)]+)[.\)\s]+(.+)/);
      return m?{lbl:m[1],txt:m[2]}:{lbl:opt,txt:opt};
    });
    if(parsedSE.length>0){
      html+='<div style="background:#f9f7f4;border:1px solid #d8d5d0;border-radius:8px;padding:.75rem 1rem;margin:.3rem 0 .75rem 0;font-size:.88rem;">';
      html+='<div style="font-weight:700;text-align:center;margin-bottom:.4rem;">List of Endings</div>';
      parsedSE.forEach(function(o){
        html+='<div style="padding:.1rem 0;"><strong>'+_escHtml(o.lbl)+'</strong>&nbsp;&nbsp;'+_escHtml(o.txt)+'</div>';
      });
      html+='</div>';
    }
    if(rMatch){
      var rSE=parseInt(rMatch[1]),rEE=parseInt(rMatch[2]);
      html+='<div style="padding-left:0;margin-bottom:.85rem;">';
      for(var riE=rSE;riE<=rEE;riE++){
        var rnE=num+(riE-rSE);
        var stmtTxtSE=stmtsSE[riE-rSE]||q.text||'';
        html+='<div style="display:flex;align-items:center;gap:.75rem;margin-bottom:.5rem;padding:.3rem 0;border-bottom:1px solid #f5f3f0;">'
             +'<span style="font-size:.85rem;font-weight:700;min-width:1.8rem;color:#555;">'+riE+'</span>'
             +'<div style="flex:1;font-size:.88rem;line-height:1.5;">'+_renderBold(stmtTxtSE)+'</div>';
        if(parsedSE.length>0){
          html+='<select id="g'+rnE+'" onchange="A['+rnE+']=this.value;dot('+rnE+',this.value!==\'\');up();" style="min-width:65px;padding:.3rem .4rem;border:1px solid #ccc;border-radius:6px;font-family:inherit;font-size:.85rem;cursor:pointer;"><option value=""></option>';
          parsedSE.forEach(function(o){ html+='<option value="'+_escHtml(o.lbl)+'">'+_escHtml(o.lbl)+'</option>'; });
          html+='</select>';
        } else {
          html+='<input class="gap" id="g'+rnE+'" oninput="ma('+rnE+',this.value)" autocomplete="off" style="min-width:60px" placeholder="e.g. A"/>';
        }
        html+='</div>';
      }
      html+='</div>';
    } else {
      html+='<div style="padding-left:2rem;margin-top:.3rem;margin-bottom:.85rem;"><input class="gap" id="g'+num+'" oninput="ma('+num+',this.value)" autocomplete="off" style="min-width:60px" placeholder="e.g. A"/></div>';
    }
  } else if(type==='Summary fill'||type==='Table/Note fill'||type==='Short answer'){
    // Summary / Table / Short answer — same as gap fill, supports gapSentence
    var gapSentST=(q.extra&&q.extra.gapSentence)||'';
    var aLinesST=(q.answer||'').split('\n').map(function(s){return s.trim();});
    if(gapSentST){
      var sentLinesST=gapSentST.split('\n');
      html+='<div style="padding-left:0;margin-top:.3rem">';
      var gapCountST=0;
      sentLinesST.forEach(function(sent,si){
        var gnST=num+gapCountST;
        // Only assign K and increment counter for lines that have a gap (***)
        if(sent.indexOf('___')!==-1){
          K[gnST]=aLinesST[gapCountST]||'';
          gapCountST++;
        }
        var partsST=sent.split('___');
        if(partsST.length>1){
          html+='<div style="font-size:.89rem;line-height:2;display:inline;">';
          partsST.forEach(function(part,pi){
            if(part) html+='<span>'+_escHtml(part)+'</span>';
            if(pi<partsST.length-1) html+='<input class="gap" id="g'+gnST+'" oninput="ma('+gnST+',this.value)" autocomplete="off" style="min-width:90px;vertical-align:middle;"/>';
          });
          html+='</div>';
        } else if(sent.trim()){
          html+='<div style="font-size:.88rem;font-weight:600;line-height:2;">'+_escHtml(sent)+'</div>';
        }
      });
      html+='</div>';
    } else {
      html+='<div style="padding-left:2rem;margin-top:.3rem"><input class="gap" id="g'+num+'" oninput="ma('+num+',this.value)" autocomplete="off" style="min-width:120px"/></div>';
    }
  } else if(type==='Diagram label'||type==='Map/Plan label'){
    // Diagram / Map — text input for label
    html+='<div style="padding-left:2rem;margin-top:.3rem;margin-bottom:.3rem;">'
         +'<input class="gap" id="g'+num+'" oninput="ma('+num+',this.value)" autocomplete="off" style="min-width:120px"/>'
         +'</div>';
  } else {
    // Check for inline sentence with ___
    var gapSentR = (q.extra && q.extra.gapSentence) || '';
    var aLinesR = (q.answer||'').split('\n').map(function(s){return s.trim();});
    if(gapSentR){
      // Inline mode: sentence with ___ replaced by input
      var sentLinesR = gapSentR.split('\n');
      html += '<div style="padding-left:0;margin-top:.3rem">';
      sentLinesR.forEach(function(sent,si){
        var gn = num + si;
        K[gn] = aLinesR[si] || aLinesR[0] || '';
        var partsR = sent.split('___');
        if(partsR.length > 1){
          html += '<div style="font-size:.89rem;line-height:2;display:flex;align-items:center;flex-wrap:wrap;gap:.2rem;margin-bottom:.2rem;">';
          partsR.forEach(function(part,pi){
            if(part) html += '<span>'+_escHtml(part)+'</span>';
            if(pi < partsR.length-1) html += '<input class="gap" id="g'+gn+'" oninput="ma('+gn+',this.value)" autocomplete="off" style="min-width:90px;vertical-align:middle;"/>';
          });
          html += '</div>';
        } else if(sent.trim()){
          html += '<div style="font-size:.88rem;font-weight:600;line-height:2;">'+_escHtml(sent)+'</div>';
        }
      });
      html += '</div>';
    } else if(rMatch){
      var rS=parseInt(rMatch[1]),rE=parseInt(rMatch[2]);
      html+='<div style="padding-left:2rem;margin-top:.3rem">';
      for(var ri2=rS;ri2<=rE;ri2++){
        var rn2=num+(ri2-rS);
        K[rn2]=aLinesR[ri2-rS]||aLinesR[0]||'';
        html+='<div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.3rem;">'
             +'<span style="font-size:.72rem;font-weight:700;color:#888;min-width:1.5rem;text-align:right;">'+ri2+'</span>'
             +'<input class="gap" id="g'+rn2+'" oninput="ma('+rn2+',this.value)" autocomplete="off" style="min-width:120px"/>'
             +'</div>';
      }
      html+='</div>';
    } else {
      html+='<div style="padding-left:2rem;margin-top:.3rem"><input class="gap" id="g'+num+'" oninput="ma('+num+',this.value)" autocomplete="off" style="min-width:120px"/></div>';
    }
  }
  html+='</div><hr class="qdiv"/>';
  return html;
}


function _renderBold(s){
  // Convert **text** to <b>text</b>
  return _escHtml(s).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>');
}
function renderReadingContent(passages){
  var newK={};
  var qNum=1;
  var passHTML='';
  var qHTML='';
  var botParts=[];

  passages.forEach(function(p,pi){
    var qStart=qNum;
    // Build passage text
    var paras=(p.text||'').split('\n').filter(function(l){return l.trim();});
    passHTML+='<h2>'+_escHtml(p.title||('Passage '+(pi+1)))+'</h2>'+paras.map(function(l){return '<p>'+_escHtml(l)+'</p>';}).join('');

    // Build questions
    (p.questions||[]).forEach(function(q){
      var num=qNum++;
      if(q.type==='2-answer MCQ'){
        var num2Raw=q.extra&&q.extra.q2num?parseInt(q.extra.q2num):qNum;
        var num2=isNaN(num2Raw)?qNum:num2Raw;
        var answers=(q.answer||'').split(',').map(function(s){return s.trim();});
        newK[num]=answers[0]||'';
        newK[num2]=answers[1]||'';
        qHTML+=_buildQHTML(q,num,num2);
        qNum=Math.max(qNum,num2+1);
      } else {
        var qLabel=String(q.num||num);
        var rangeM=qLabel.match(/^(\d+)[–—\-](\d+)$/);
        var ansLines=(q.answer||'').split('\n').map(function(s){return s.trim();}).filter(Boolean);
        if(rangeM){
          var rS=parseInt(rangeM[1]),rE=parseInt(rangeM[2]);
          for(var ri=rS;ri<=rE;ri++){
            var rn=(ri===rS)?num:(qNum++);
            newK[rn]=ansLines[ri-rS]||'';
          }
        } else {
          newK[num]=ansLines[0]||q.answer||'';
        }
        qHTML+=_buildQHTML(q,num,null);
      }
    });

    var qEnd=qNum-1;
    botParts.push('<button class="part-nav'+(pi===0?' on':'')+'" id="pnav'+(pi+1)+'" onclick="goToPart('+(pi+1)+')">Passage '+(pi+1)+' \u00b7 Q'+qStart+'\u2013'+qEnd+'</button>');
  });

  var newT=qNum-1;

  // Replace passage content
  var ppDiv=document.getElementById('pp');
  if(ppDiv) ppDiv.innerHTML=passHTML;

  // Replace questions area
  var qsDiv=document.querySelector('.qs');
  if(qsDiv) qsDiv.innerHTML=qHTML+'<div style="height:1.5rem"></div>';

  // Replace botbar (keep submit button)
  var bb=document.querySelector('.botbar');
  if(bb){
    var subbtn='<button class="subbtn" onclick="chk()">Submit \u2713</button>';
    bb.innerHTML=botParts.join('')+subbtn;
  }

  // Update answer key and total
  K=newK;
  T=newT;
  A={};

  // Update phdr
  var ph1=document.querySelector('.ph1');
  var ph2=document.querySelector('.ph2');
  if(ph1) ph1.textContent='Passage 1';
  if(ph2&&passages[0]) ph2.innerHTML=_renderBold(passages[0].instruction||('Read the text and answer questions 1\u2013'+newT+'.')).replace(/\n/g,'<br>');
}
