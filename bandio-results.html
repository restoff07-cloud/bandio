<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bandio — Results</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#f4f4f4;color:#1a1a1a;min-height:100vh;}

/* ── TOP NAV ── */
.topnav{background:#0e0e0e;padding:.65rem 1.25rem;display:flex;align-items:center;gap:.75rem;position:sticky;top:0;z-index:50;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;color:#f5f2eb;text-decoration:none;}
.logo span{color:#d4541a;}
.nav-lbl{font-size:.8rem;color:rgba(255,255,255,.45);}
.nav-back{margin-left:auto;padding:.32rem .85rem;border:.5px solid rgba(255,255,255,.2);border-radius:100px;font-size:.76rem;color:rgba(255,255,255,.55);text-decoration:none;}
.nav-back:hover{background:rgba(255,255,255,.08);color:#fff;}

/* ── PAGE WRAPPER ── */
.page{max-width:700px;margin:0 auto;padding:2rem 1.25rem 5rem;}

/* ── HERO CHECK ── */
.hero{text-align:center;padding:2rem 0 1.5rem;}
.hero-icon{width:64px;height:64px;border-radius:50%;border:3px solid #2a9d68;display:flex;align-items:center;justify-content:center;margin:0 auto .9rem;font-size:1.8rem;}
.hero-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.6rem;margin-bottom:.2rem;}
.hero-sub{font-size:.88rem;color:#888;}

/* ── SCORE CARD ── */
.score-card{background:#fff;border-radius:14px;padding:1.4rem 1.5rem;margin-bottom:1rem;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.sc-row{display:flex;align-items:center;gap:1.25rem;}
.sc-band{font-family:'Syne',sans-serif;font-weight:800;font-size:3.6rem;color:#d4541a;line-height:1;}
.sc-info{flex:1;}
.sc-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#aaa;margin-bottom:.18rem;}
.sc-desc{font-size:.92rem;font-weight:600;color:#1a1a1a;margin-bottom:.5rem;}
.sc-fraction{font-size:.84rem;color:#666;}
.sc-fraction strong{color:#1a1a1a;font-size:.95rem;}

/* ── STATS ROW ── */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem;margin-bottom:1rem;}
.stat{border-radius:12px;padding:1rem 1.1rem;text-align:center;}
.stat.ok{background:#dcfce7;}
.stat.ng{background:#fee2e2;}
.stat.bl{background:#f0f0f0;}
.stat-num{font-family:'Syne',sans-serif;font-weight:800;font-size:2rem;line-height:1;margin-bottom:.2rem;}
.stat.ok .stat-num{color:#16a34a;}
.stat.ng .stat-num{color:#dc2626;}
.stat.bl .stat-num{color:#888;}
.stat-lbl{font-size:.74rem;font-weight:700;}
.stat.ok .stat-lbl{color:#16a34a;}
.stat.ng .stat-lbl{color:#dc2626;}
.stat.bl .stat-lbl{color:#888;}

/* ── ACTION BUTTONS ── */
.btn-row{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:1.25rem;}
.btn{padding:.65rem 1.25rem;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;border:none;text-decoration:none;display:inline-flex;align-items:center;gap:.4rem;transition:all .15s;white-space:nowrap;}
.btn.primary{background:#1a1a1a;color:#fff;flex:1;justify-content:center;}
.btn.primary:hover{background:#d4541a;}
.btn.sec{background:#fff;color:#1a1a1a;border:1.5px solid #e0ddd8;}
.btn.sec:hover{border-color:#999;background:#f5f3f0;}

/* ── ANSWER SHEET ── */
.sheet-card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.sheet-header{display:flex;align-items:center;justify-content:space-between;padding:.85rem 1.25rem;border-bottom:1px solid #f0f0f0;}
.sheet-title{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#888;}
.show-toggle{display:flex;align-items:center;gap:.45rem;font-size:.8rem;font-weight:600;color:#1a1a1a;cursor:pointer;user-select:none;}
.toggle-track{width:38px;height:20px;border-radius:10px;background:#ccc;position:relative;transition:background .15s;flex-shrink:0;}
.toggle-track.on{background:#d4541a;}
.toggle-thumb{position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .15s;box-shadow:0 1px 3px rgba(0,0,0,.25);}
.toggle-track.on .toggle-thumb{transform:translateX(18px);}

/* answer rows */
.ans-row{display:flex;align-items:center;gap:.75rem;padding:.55rem 1.25rem;border-bottom:1px solid #f5f5f5;transition:background .1s;}
.ans-row:last-child{border-bottom:none;}
.ans-row.ok-row{background:#f0fdf4;}
.ans-row.ng-row{background:#fff5f5;}
.ans-row.bl-row{background:#fafafa;}
.ans-qnum{min-width:28px;font-size:.72rem;font-weight:700;color:#bbb;}
.ans-icon{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:800;flex-shrink:0;}
.ans-icon.ok{background:#dcfce7;color:#16a34a;}
.ans-icon.ng{background:#fee2e2;color:#dc2626;}
.ans-icon.bl{background:#f0f0f0;color:#aaa;}
.ans-yours{flex:1;font-size:.82rem;}
.ans-yours .label{font-size:.68rem;color:#aaa;font-weight:600;display:block;margin-bottom:.05rem;}
.ans-yours .val{font-weight:600;color:#1a1a1a;}
.ans-yours .val.blank{color:#bbb;font-style:italic;font-weight:400;}
.ans-correct{flex:1;font-size:.82rem;}
.ans-correct .label{font-size:.68rem;font-weight:600;display:block;margin-bottom:.05rem;}
.ans-correct.ok-col .label{color:#aaa;}
.ans-correct.ng-col .label{color:#16a34a;}
.ans-correct.bl-col .label{color:#16a34a;}
.ans-correct .val{font-weight:700;}
.ans-correct.ok-col .val{color:#aaa;}
.ans-correct.ng-col .val{color:#16a34a;}
.ans-correct.bl-col .val{color:#16a34a;}

@media(max-width:500px){
  .sc-band{font-size:2.8rem;}
  .stats{gap:.5rem;}
  .stat-num{font-size:1.6rem;}
  .btn-row{flex-direction:column;}
  .btn.primary{flex:none;width:100%;}
}
</style>
</head>
<body>

<div class="topnav">
  <a class="logo" href="bandio-dashboard.html">Band<span>io</span></a>
  <span style="color:rgba(255,255,255,.2)">|</span>
  <span class="nav-lbl" id="nav-lbl">Results</span>
  <a class="nav-back" href="bandio-dashboard.html">← Dashboard</a>
</div>

<div class="page">

  <!-- HERO -->
  <div class="hero">
    <div class="hero-icon">✓</div>
    <div class="hero-title">Test Complete!</div>
    <div class="hero-sub" id="hero-sub">Here are your results</div>
  </div>

  <!-- SCORE CARD -->
  <div class="score-card">
    <div class="sc-row">
      <div class="sc-band" id="sc-band">—</div>
      <div class="sc-info">
        <div class="sc-label">IELTS Band Score</div>
        <div class="sc-desc" id="sc-desc">—</div>
        <div class="sc-fraction">Your Score: <strong id="sc-fraction">0 / 0</strong></div>
      </div>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat ok">
      <div class="stat-num" id="st-correct">0</div>
      <div class="stat-lbl">Correct ✓</div>
    </div>
    <div class="stat ng">
      <div class="stat-num" id="st-wrong">0</div>
      <div class="stat-lbl">Wrong ✗</div>
    </div>
    <div class="stat bl">
      <div class="stat-num" id="st-blank">0</div>
      <div class="stat-lbl">Blank —</div>
    </div>
  </div>

  <!-- BUTTONS -->
  <div class="btn-row">
    <a class="btn primary" id="btn-review" href="#">📋 Review test</a>
    <a class="btn sec" href="bandio-dashboard.html">Dashboard</a>
  </div>

  <!-- ANSWER SHEET -->
  <div class="sheet-card">
    <div class="sheet-header">
      <div class="sheet-title">Answer Sheet</div>
      <div class="show-toggle" onclick="toggleCorrect(this)">
        <div class="toggle-track on" id="toggle-track"><div class="toggle-thumb"></div></div>
        Show Correct Answers
      </div>
    </div>
    <div id="answer-sheet"></div>
  </div>

</div>

<script>
var DESCS = {
  '9.0':'Expert user — outstanding performance.',
  '8.5':'Very good user — excellent result.',
  '8.0':'Very good user — strong performance.',
  '7.5':'Good user — above average.',
  '7.0':'Good user — solid performance.',
  '6.5':'Competent user — good result.',
  '6.0':'Competent user — keep practising.',
  '5.5':'Modest user — more practice needed.',
  '5.0':'Modest user — focus on weak areas.',
  '4.5':'Limited user — keep going.',
  '4.0':'Limited user — keep studying.',
  '3.5':'Keep studying hard!'
};

var showCorrect = true;

function toggleCorrect(el) {
  showCorrect = !showCorrect;
  var track = document.getElementById('toggle-track');
  track.classList.toggle('on', showCorrect);
  renderSheet();
}

function renderSheet() {
  var d = window._data;
  if (!d || !d.answers) return;
  var html = '';
  d.answers.forEach(function(a) {
    var cls = a.status === 'correct' ? 'ok-row' : a.status === 'wrong' ? 'ng-row' : 'bl-row';
    var icoCls = a.status === 'correct' ? 'ok' : a.status === 'wrong' ? 'ng' : 'bl';
    var icoChar = a.status === 'correct' ? '✓' : a.status === 'wrong' ? '✗' : '—';
    var yourVal = a.yours || '';
    var corrVal = a.correct || '';
    // Correct column styling
    var corrColCls = a.status === 'correct' ? 'ok-col' : a.status === 'wrong' ? 'ng-col' : 'bl-col';
    var corrLabel = a.status === 'correct' ? 'Correct' : 'Correct:';

    html += '<div class="ans-row ' + cls + '">'
          + '<span class="ans-qnum">' + a.q + '</span>'
          + '<div class="ans-icon ' + icoCls + '">' + icoChar + '</div>'
          + '<div class="ans-yours">'
          +   '<span class="label">Your answer</span>'
          +   '<span class="val' + (yourVal ? '' : ' blank') + '">' + (yourVal || 'left blank') + '</span>'
          + '</div>'
          + (showCorrect
              ? '<div class="ans-correct ' + corrColCls + '">'
              +   '<span class="label">' + corrLabel + '</span>'
              +   '<span class="val">' + (corrVal || '—') + '</span>'
              + '</div>'
              : '')
          + '</div>';
  });
  document.getElementById('answer-sheet').innerHTML = html;
}

// Load from localStorage
var raw = localStorage.getItem('bnd_last_result');
var d = null;
if (raw) { try { d = JSON.parse(raw); } catch(e) {} }

if (!d) {
  document.body.innerHTML = '<div style="font-family:DM Sans,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:1rem;color:#1a1a1a;"><div style="font-size:2rem;">\u{1F4CB}</div><div style="font-size:1.1rem;font-weight:600;">No results yet</div><div style="font-size:.88rem;color:#888;">Complete a test first, then come back here.</div><a href="bandio-dashboard.html" style="margin-top:.5rem;padding:.6rem 1.4rem;background:#1a1a1a;color:#fff;border-radius:100px;text-decoration:none;font-size:.85rem;font-weight:600;">← Go to Dashboard</a></div>';
  throw new Error('no data');
}

window._data = d;

// Populate nav + hero
document.getElementById('nav-lbl').textContent = (d.skill || 'Results');
if (d.testName) document.getElementById('hero-sub').textContent = d.testName;

// Score card
var band = d.band || '—';
document.getElementById('sc-band').textContent = band;
document.getElementById('sc-desc').textContent = DESCS[band] || 'Keep practising!';
document.getElementById('sc-fraction').textContent = (d.correct || 0) + ' / ' + (d.total || 0);

// Stats
document.getElementById('st-correct').textContent = d.correct || 0;
document.getElementById('st-wrong').textContent   = d.wrong   || 0;
document.getElementById('st-blank').textContent   = d.blank   || 0;

// Review button
var reviewBtn = document.getElementById('btn-review');
reviewBtn.href = d.reviewUrl || 'bandio-dashboard.html';

// Answer sheet
renderSheet();
</script>
</body>
</html>
