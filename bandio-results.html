<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bandio — Results</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--white:#ffffff;--bg:#f7f7f8;--ink:#111111;--ink2:#444444;--ink3:#777777;--ink4:#bbbbbb;--bdr:#e8e8ea;--bdr2:#d4d4d8;--blue:#4f7ef8;--blue-bg:#eef2ff;--green:#22c55e;--red:#ef4444;--sh:0 1px 2px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.04);--r:10px;--rm:14px;--rl:18px;}
html,body{min-height:100%;font-family:"Geist",system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
body{background:var(--bg);color:var(--ink);}
a{text-decoration:none;color:inherit;}
.topnav{background:var(--white);border-bottom:1px solid var(--bdr);padding:.75rem 1.5rem;display:flex;align-items:center;gap:.75rem;position:sticky;top:0;z-index:50;}
.t-logo{font-size:1.1rem;font-weight:700;color:var(--ink);letter-spacing:-.025em;display:flex;align-items:center;gap:.35rem;}
.t-logo-dot{width:6px;height:6px;border-radius:50%;background:var(--blue);}
.t-sep{color:var(--ink4);font-size:.75rem;}
.t-lbl{font-size:.82rem;color:var(--ink3);}
.t-back{margin-left:auto;padding:.35rem .85rem;border:1px solid var(--bdr);border-radius:100px;font-size:.78rem;color:var(--ink2);background:var(--white);cursor:pointer;transition:all .15s;}
.t-back:hover{border-color:var(--bdr2);background:var(--bg);}
.page{max-width:680px;margin:0 auto;padding:2rem 1.25rem 5rem;}
.hero{text-align:center;padding:2rem 0 1.5rem;}
.hero-icon{width:60px;height:60px;border-radius:50%;border:2.5px solid var(--green);display:flex;align-items:center;justify-content:center;margin:0 auto .85rem;font-size:1.6rem;background:#f0fdf4;}
.hero-title{font-size:1.5rem;font-weight:700;letter-spacing:-.03em;color:var(--ink);margin-bottom:.2rem;}
.hero-sub{font-size:.85rem;color:var(--ink3);}
.score-card{background:var(--white);border:1px solid var(--bdr);border-radius:var(--rl);padding:1.35rem 1.5rem;margin-bottom:1rem;box-shadow:var(--sh);}
.sc-row{display:flex;align-items:center;gap:1.1rem;}
.sc-band{font-size:3.2rem;font-weight:700;color:var(--blue);line-height:1;letter-spacing:-.04em;}
.sc-label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--ink4);margin-bottom:.15rem;}
.sc-desc{font-size:.9rem;font-weight:600;color:var(--ink);margin-bottom:.4rem;}
.sc-fraction{font-size:.82rem;color:var(--ink3);}
.sc-fraction strong{color:var(--ink);}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.7rem;margin-bottom:1rem;}
.stat{border-radius:var(--rm);padding:.9rem 1rem;text-align:center;}
.stat.ok{background:#f0fdf4;}
.stat.ng{background:#fef2f2;}
.stat.bl{background:var(--bg);}
.stat-num{font-size:1.85rem;font-weight:700;line-height:1;margin-bottom:.18rem;}
.stat.ok .stat-num{color:var(--green);}
.stat.ng .stat-num{color:var(--red);}
.stat.bl .stat-num{color:var(--ink4);}
.stat-lbl{font-size:.72rem;font-weight:600;}
.stat.ok .stat-lbl{color:var(--green);}
.stat.ng .stat-lbl{color:var(--red);}
.stat.bl .stat-lbl{color:var(--ink4);}
.btn-row{display:flex;gap:.55rem;flex-wrap:wrap;margin-bottom:1.25rem;}
.btn{padding:.6rem 1.2rem;border-radius:100px;font-family:inherit;font-size:.83rem;font-weight:600;cursor:pointer;border:none;text-decoration:none;display:inline-flex;align-items:center;gap:.38rem;transition:all .15s;white-space:nowrap;}
.btn.primary{background:var(--ink);color:#fff;flex:1;justify-content:center;}
.btn.primary:hover{background:var(--blue);}
.btn.sec{background:var(--white);color:var(--ink);border:1.5px solid var(--bdr);}
.btn.sec:hover{border-color:var(--bdr2);}
.sheet-card{background:var(--white);border:1px solid var(--bdr);border-radius:var(--rl);overflow:hidden;box-shadow:var(--sh);}
.sheet-header{display:flex;align-items:center;justify-content:space-between;padding:.8rem 1.2rem;border-bottom:1px solid var(--bdr);}
.sheet-title{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);}
.show-toggle{display:flex;align-items:center;gap:.42rem;font-size:.78rem;font-weight:600;color:var(--ink);cursor:pointer;user-select:none;}
.toggle-track{width:36px;height:19px;border-radius:10px;background:var(--bdr2);position:relative;transition:background .15s;flex-shrink:0;}
.toggle-track.on{background:var(--blue);}
.toggle-thumb{position:absolute;top:2px;left:2px;width:15px;height:15px;border-radius:50%;background:#fff;transition:transform .15s;box-shadow:0 1px 3px rgba(0,0,0,.25);}
.toggle-track.on .toggle-thumb{transform:translateX(17px);}
.ans-row{display:flex;align-items:center;gap:.7rem;padding:.52rem 1.2rem;border-bottom:1px solid var(--bdr);transition:background .1s;}
.ans-row:last-child{border-bottom:none;}
.ans-row.ok-row{background:#f0fdf4;}
.ans-row.ng-row{background:#fef2f2;}
.ans-row.bl-row{background:var(--bg);}
.ans-qnum{min-width:26px;font-size:.7rem;font-weight:700;color:var(--ink4);}
.ans-icon{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:800;flex-shrink:0;}
.ans-icon.ok{background:#dcfce7;color:var(--green);}
.ans-icon.ng{background:#fee2e2;color:var(--red);}
.ans-icon.bl{background:var(--bg);color:var(--ink4);}
.ans-yours{flex:1;font-size:.8rem;}
.ans-yours .lbl{font-size:.65rem;color:var(--ink4);font-weight:600;display:block;margin-bottom:.04rem;}
.ans-yours .val{font-weight:600;color:var(--ink);}
.ans-yours .val.blank{color:var(--ink4);font-style:italic;font-weight:400;}
.ans-correct{flex:1;font-size:.8rem;}
.ans-correct .lbl{font-size:.65rem;font-weight:600;display:block;margin-bottom:.04rem;}
.ans-correct.ok-col .lbl{color:var(--ink4);}
.ans-correct.ng-col .lbl,.ans-correct.bl-col .lbl{color:var(--green);}
.ans-correct .val{font-weight:700;}
.ans-correct.ok-col .val{color:var(--ink4);}
.ans-correct.ng-col .val,.ans-correct.bl-col .val{color:var(--green);}
@media(max-width:500px){.sc-band{font-size:2.5rem;}.stats{gap:.45rem;}.stat-num{font-size:1.5rem;}.btn-row{flex-direction:column;}.btn.primary{flex:none;width:100%;}}
</style>
</head>
<body>
<div class="topnav">
  <div class="t-logo">Bandio<span class="t-logo-dot"></span></div>
  <span class="t-sep">|</span>
  <span class="t-lbl" id="nav-lbl">Results</span>
  <a class="t-back" href="bandio-dashboard.html">← Dashboard</a>
</div>
<div class="page">
  <div class="hero">
    <div class="hero-icon">✓</div>
    <div class="hero-title">Test Complete!</div>
    <div class="hero-sub" id="hero-sub">Here are your results</div>
  </div>
  <div class="score-card">
    <div class="sc-row">
      <div class="sc-band" id="sc-band">—</div>
      <div class="sc-info">
        <div class="sc-label">IELTS Band Score</div>
        <div class="sc-desc" id="sc-desc">—</div>
        <div class="sc-fraction">Your Score: <strong id="sc-fraction">0 / 0</strong></div>
      </div>
    </div>
  </div>
  <div class="stats">
    <div class="stat ok"><div class="stat-num" id="st-correct">0</div><div class="stat-lbl">Correct ✓</div></div>
    <div class="stat ng"><div class="stat-num" id="st-wrong">0</div><div class="stat-lbl">Wrong ✗</div></div>
    <div class="stat bl"><div class="stat-num" id="st-blank">0</div><div class="stat-lbl">Blank —</div></div>
  </div>
  <div class="btn-row">
    <a class="btn primary" id="btn-review" href="#">📋 Review test</a>
    <a class="btn sec" href="bandio-dashboard.html">Dashboard</a>
  </div>
  <div class="sheet-card">
    <div class="sheet-header">
      <div class="sheet-title">Answer Sheet</div>
      <div class="show-toggle" onclick="toggleCorrect(this)">
        <div class="toggle-track on" id="toggle-track"><div class="toggle-thumb"></div></div>
        Show Correct Answers
      </div>
    </div>
    <div id="answer-sheet"></div>
  </div>
</div>
<script>

var DESCS = {
  '9.0':'Expert user — outstanding performance.',
  '8.5':'Very good user — excellent result.',
  '8.0':'Very good user — strong performance.',
  '7.5':'Good user — above average.',
  '7.0':'Good user — solid performance.',
  '6.5':'Competent user — good result.',
  '6.0':'Competent user — keep practising.',
  '5.5':'Modest user — more practice needed.',
  '5.0':'Modest user — focus on weak areas.',
  '4.5':'Limited user — keep going.',
  '4.0':'Limited user — keep studying.',
  '3.5':'Keep studying hard!'
};

var showCorrect = true;

function toggleCorrect(el) {
  showCorrect = !showCorrect;
  var track = document.getElementById('toggle-track');
  track.classList.toggle('on', showCorrect);
  renderSheet();
}

function renderSheet() {
  var d = window._data;
  if (!d || !d.answers) return;
  var html = '';
  d.answers.forEach(function(a) {
    var cls = a.status === 'correct' ? 'ok-row' : a.status === 'wrong' ? 'ng-row' : 'bl-row';
    var icoCls = a.status === 'correct' ? 'ok' : a.status === 'wrong' ? 'ng' : 'bl';
    var icoChar = a.status === 'correct' ? '✓' : a.status === 'wrong' ? '✗' : '—';
    var yourVal = a.yours || '';
    var corrVal = a.correct || '';
    // Correct column styling
    var corrColCls = a.status === 'correct' ? 'ok-col' : a.status === 'wrong' ? 'ng-col' : 'bl-col';
    var corrLabel = a.status === 'correct' ? 'Correct' : 'Correct:';

    html += '<div class="ans-row ' + cls + '">'
          + '<span class="ans-qnum">' + a.q + '</span>'
          + '<div class="ans-icon ' + icoCls + '">' + icoChar + '</div>'
          + '<div class="ans-yours">'
          +   '<span class="label">Your answer</span>'
          +   '<span class="val' + (yourVal ? '' : ' blank') + '">' + (yourVal || 'left blank') + '</span>'
          + '</div>'
          + (showCorrect
              ? '<div class="ans-correct ' + corrColCls + '">'
              +   '<span class="label">' + corrLabel + '</span>'
              +   '<span class="val">' + (corrVal || '—') + '</span>'
              + '</div>'
              : '')
          + '</div>';
  });
  document.getElementById('answer-sheet').innerHTML = html;
}

// Load from localStorage
var raw = localStorage.getItem('bnd_last_result');
var d = null;
if (raw) { try { d = JSON.parse(raw); } catch(e) {} }

if (!d) {
  document.body.innerHTML = '<div style="font-family:DM Sans,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:1rem;color:#1a1a1a;"><div style="font-size:2rem;">\u{1F4CB}</div><div style="font-size:1.1rem;font-weight:600;">No results yet</div><div style="font-size:.88rem;color:#888;">Complete a test first, then come back here.</div><a href="bandio-dashboard.html" style="margin-top:.5rem;padding:.6rem 1.4rem;background:#1a1a1a;color:#fff;border-radius:100px;text-decoration:none;font-size:.85rem;font-weight:600;">← Go to Dashboard</a></div>';
  throw new Error('no data');
}

window._data = d;

// Populate nav + hero
document.getElementById('nav-lbl').textContent = (d.skill || 'Results');
if (d.testName) document.getElementById('hero-sub').textContent = d.testName;

// Score card
var band = d.band || '—';
document.getElementById('sc-band').textContent = band;
document.getElementById('sc-desc').textContent = DESCS[band] || 'Keep practising!';
document.getElementById('sc-fraction').textContent = (d.correct || 0) + ' / ' + (d.total || 0);

// Stats
document.getElementById('st-correct').textContent = d.correct || 0;
document.getElementById('st-wrong').textContent   = d.wrong   || 0;
document.getElementById('st-blank').textContent   = d.blank   || 0;

// Review button
var reviewBtn = document.getElementById('btn-review');
reviewBtn.href = d.reviewUrl || 'bandio-dashboard.html';

// Answer sheet
renderSheet();

</script>
</body></html>
